name: CI & Publish
on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary (Linux)
        if: runner.os == 'Linux'
        run: bun build src/cli.ts --compile --outfile dist/litespec-linux-x64
      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: |
          bun build src/cli.ts --compile --outfile dist/litespec-macos-x64
          # Apple Silicon 构建（macos-latest 可能是 arm64）
          if [ "$(uname -m)" == "arm64" ]; then
            bun build src/cli.ts --compile --outfile dist/litespec-macos-arm64
          fi
      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: bun build src/cli.ts --compile --outfile dist/litespec-win-x64.exe
      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litespec-binaries-${{ matrix.os }}
          path: dist/litespec-*
          if-no-files-found: error

  publish:
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: litespec-binaries-*
          merge-multiple: true
      - name: List downloaded binaries
        run: ls -la dist/
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
